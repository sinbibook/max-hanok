<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Max 한옥 - 홈</title>

    <link rel="stylesheet" href="styles/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/popup.css">

    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script src="js/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="js/header-footer-loader.js"></script>
  <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Max 한옥 - 홈" />
  <meta property="og:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />
  <meta property="og:image" content="https://bookingplay-media-fred.s3.amazonaws.com/item_images/2021/12/06/kOscAnHqKp4e.jpg" />
  <meta property="og:url" content="https://max-hanok.com" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Max 한옥 - 홈" />
  <meta name="twitter:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />
  <meta name="twitter:image" content="https://bookingplay-media-fred.s3.amazonaws.com/item_images/2021/12/06/kOscAnHqKp4e.jpg" />
</head>
<body>
    <div id="sh_wrapper">
    <main id="sh_container">
            <!-- sh_section [s] -->
            <section id="sh_section" style="background:var(--color-primary)">
                <!-- main_banner [s] -->
                <!-- MAPPER: customFields.pages.index.sections[0].hero.images[isSelected] 동적 배경이미지 적용 -->
                <article>
                    <div id="main_banner">
                        <div class="swiper-container main_slide">
                            <div class="swiper-wrapper" data-index-hero-slides>
                                <div class="swiper-slide" style="background-size:cover;"></div>
                                <div class="swiper-slide" style="background-size:cover;"></div>
                                <div class="swiper-slide" style="background-size:cover;"></div>
                                <div class="swiper-slide" style="background-size:cover;"></div>
                                <div class="swiper-slide" style="background-size:cover;"></div>
                                <div class="swiper-slide" style="background-size:cover;"></div>
                                <div class="swiper-slide" style="background-size:cover;"></div>
                                <div class="swiper-slide" style="background-size:cover;"></div>
                                <div class="swiper-slide" style="background-size:cover;"></div>
                            </div>
                        </div>
                        <div class="txt" data-aos="fade-up">
                            <!-- MAPPER: customFields.pages.index.sections[0].hero.title, description -->
                            <div class="main_txt">
                                <p data-index-hero-description></p>
                                <span data-index-hero-title></span>
                                <a href="#!" data-booking-link>BOOKING NOW</a>
                            </div>
                        </div>
                        <div class="controls">
                            <button type="button" class="arr prev">
                                <img src="images/main_prev.png" alt="prev">
                            </button>
                            <div class="swiper-container pager">
                                <ul class="swiper-wrapper"></ul>
                            </div>
                            <div class="swiper-progress-bar">
                                <span class="slide_progress-bar"></span>
                            </div>
                            <p class="num num02">0</p>
                            <button type="button" class="arr next">
                                <img src="images/main_next.png" alt="next">
                            </button>
                        </div>
                    </div>
                </article>
                <!-- main_banner [e] -->

                <!-- atc01 [s] -->
                <article>
                    <article id="atc01">
                        <div class="all_wrap">
                            <img src="images/shadow_top.png" class="top_bg">
                            <img src="images/shadow_bottom.png" class="bottom_bg">
                            <div data-aos="fade-up" class="aos-init">
                                <div class="tit">
                                    <div class="deco"></div>
                                    <p><span>About</span><span data-essence-description>Jajakdo Aroma</span></p>
                                </div>
                                <div class="pager"></div>
                            </div>
                            <div class="swiper-container atc01_slide" data-aos="fade-up">
                                <div class="controls">
                                    <span class="arr prev"><img src="images/left.png" alt="img01"></span>
                                    <span class="arr next"><img src="images/right.png" alt="img01"></span>
                                </div>
                                <ul class="swiper-wrapper" data-essence-slides>
                                    <!-- MAPPER: customFields.pages.index.sections[0].essence.images[isSelected] 동적 생성 -->
                                </ul>
                            </div>
                        </div>
                    </article>
                </article>
                <!-- atc01 [e] -->

                <!-- roomList [s] -->
                <article>
                    <div id="roomList">
                        <div class="all_wrap">
                            <div class="tit_area room_tit" data-aos="fade-up">
                                <!-- MAPPER: gallery.title (fallback: stay with comfort), property.englishName, gallery.description -->
                                <div data-aos="fade-right">
                                    <b data-gallery-title-comfort>stay with comfort</b>
                                    <p><span data-property-english-name></span><span>rooms</span></p>
                                </div>
                                <b data-aos="fade-left" data-gallery-description></b>
                            </div>
                            <div class="wrap" data-aos="fade-up">
                                <div class="controls">
                                    <span class="arr prev">
                                        <img src="images/left.png" alt="img01">
                                    </span>
                                    <span class="arr next">
                                        <img src="images/right.png" alt="img01">
                                    </span>
                                </div>
                                <!-- MAPPER: property.rooms[].images[0].url + name + description -->
                                <div class="room_slider swiper-container">
                                    <div class="swiper-wrapper room_slide" data-index-room-slides>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </article>
                <!-- roomList [e] -->

                <!-- atc02 [s] -->
                <!-- MAPPER: customFields.pages.index.sections[0].closing.title, description, images[isSelected] -->
                <article>
                    <div id="atc02">
                        <div class="bg">
                            <img alt="visual" data-closing-image>
                        </div>
                        <div class="txt">
                            <p data-aos="fade-up" data-closing-title>your perfect stay</p>
                            <span data-aos="fade-up" data-closing-description>
                            </span>
                            <a data-aos="fade-up" href="main.html">(<span>More View</span>)</a>
                        </div>
                    </div>
                </article>
                <!-- atc02 [e] -->

                <!-- atc03 [s] -->
                <!-- MAPPER: customFields.pages.index.sections[0].signature.title, property.facilities[].images[isSelected] + name -->
                <article>
                    <div id="atc03" data-aos="fade-up">
                        <div class="tit">
                            <div class="deco"></div>
                            <p><span data-index-signature-title></span></p>
                            <b data-index-signature-description></b>
                        </div>
                        <div class="controls">
                            <span class="arr prev">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-chevron-left">
                                    <polyline points="15 18 9 12 15 6"></polyline>
                                </svg>
                            </span>
                            <span class="arr next">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-chevron-right">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </span>
                        </div>
                        <div class="swiper-container offer_slide" data-aos="fade-up">
                            <ul class="swiper-wrapper" data-index-facility-slides>
                            </ul>
                        </div>
                    </div>
                </article>
                <!-- atc03 [e] -->
            </section>
            <!-- sh_section [e] -->
        </section>
    </main>
    </div>

    <script src="js/preview-handler.js"></script>
    <script src="js/image-helpers.js"></script>
    <script src="js/data-mapper/core/base-mapper.js"></script>
    <script src="js/data-mapper/pages/index-mapper.js"></script>
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
    <script src="js/common.js"></script>
    <script src="js/pages/index.js"></script>
    <div id="popup-container"></div>
    <script src="js/popup.js"></script>
</body>
</html>
