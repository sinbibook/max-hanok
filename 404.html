<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" class="is-loading">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title data-page-title>Max 한옥</title>
    <!-- SEO: homepage.seo → preview-handler.applySeo()가 동적 주입 (하드코딩 없음) -->
    <meta property="og:type" content="website" />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" type="text/css" href="styles/reset.css" />
    <link rel="stylesheet" type="text/css" href="styles/theme.css" />
    <link rel="stylesheet" type="text/css" href="styles/style.css" />
    <style>
      .error_wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
        text-align: center;
        padding: 200px 20px 120px;
      }
      .error_wrap .error_code {
        font-family: var(--font-en-main);
        font-size: 110px;
        line-height: 1;
        color: var(--color-secondary);
        margin-bottom: 20px;
      }
      .error_wrap .error_title {
        font-family: var(--font-ko-sub);
        font-size: 26px;
        color: var(--color-secondary);
        margin-bottom: 16px;
      }
      .error_wrap .error_msg {
        font-size: 15px;
        color: #867165;
        line-height: 1.8;
        margin-bottom: 36px;
      }
      .error_wrap .btn_home {
        display: inline-block;
        padding: 14px 40px;
        border: 1px solid var(--color-secondary);
        font-size: 14px;
        color: var(--color-secondary);
        text-decoration: none;
        letter-spacing: 0.05em;
        transition:
          background 0.3s,
          color 0.3s;
      }
      .error_wrap .btn_home:hover {
        background: var(--color-secondary);
        color: #fff;
      }
      @media (max-width: 768px) {
        .error_wrap {
          padding: 140px 20px 80px;
        }
        .error_wrap .error_code {
          font-size: 72px;
        }
        .error_wrap .error_title {
          font-size: 20px;
        }
      }
    </style>
    <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Max 한옥" />
  <meta property="og:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />
  <meta property="og:image" content="https://bookingplay-media-fred.s3.amazonaws.com/item_images/2021/12/06/kOscAnHqKp4e.jpg" />
  <meta property="og:url" content="https://max-hanok.com" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Max 한옥" />
  <meta name="twitter:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />
  <meta name="twitter:image" content="https://bookingplay-media-fred.s3.amazonaws.com/item_images/2021/12/06/kOscAnHqKp4e.jpg" />
</head>
  <body>
    <div id="wrap">
      <div id="header-wrap"></div>

      <div id="container">
        <div class="error_wrap">
          <div>
            <div class="error_code">404</div>
            <h1 class="error_title">페이지를 찾을 수 없습니다</h1>
            <p class="error_msg">
              요청하신 페이지가 존재하지 않거나 비활성화되었습니다.
              <br />
              홈으로 돌아가 다시 이용해 주세요.
            </p>
            <a href="index.html" class="btn_home">홈으로 돌아가기</a>
          </div>
        </div>
      </div>

      <div id="footer-wrap"></div>
    </div>

    <!-- infra: 데이터 매핑 & 동적 헤더/푸터 -->

    <script src="js/header-footer-loader.js"></script>
    <!-- 페이지 인터랙션 (vanilla) -->

</html>
