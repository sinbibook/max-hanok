<!DOCTYPE html>
<html lang="ko">
  <head>
    <!-- 렌더 게이트: 매핑 전 placeholder/fallback 깜빡임 방지 (매핑 완료 시 페이드인) -->
    <style>html.tpl-loading body{opacity:0}body{opacity:1;transition:opacity .3s ease}</style>
    <script>document.documentElement.classList.add('tpl-loading');window.__tplReveal=function(){document.documentElement.classList.remove('tpl-loading');};setTimeout(function(){window.__tplReveal&&window.__tplReveal();},3000);</script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:,">
    <title data-page-title>Max 한옥 - 예약안내</title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <!-- Preload critical resources -->
    <link rel="preload" href="styles/theme.css" as="style">
    <link rel="preload" href="styles/common.css" as="style">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/reservation.css" />
    <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Max 한옥 - 예약안내" />
  <meta property="og:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />
  <meta property="og:image" content="https://bookingplay-media-fred.s3.amazonaws.com/item_images/2021/12/06/kOscAnHqKp4e.jpg" />
  <meta property="og:url" content="https://max-hanok.com" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Max 한옥 - 예약안내" />
  <meta name="twitter:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />
  <meta name="twitter:image" content="https://bookingplay-media-fred.s3.amazonaws.com/item_images/2021/12/06/kOscAnHqKp4e.jpg" />
</head>
  <body>
    <div class="wrapper">
      <div class="container">
        <!-- MAPPER: customFields.pages.reservation.sections[0].hero.images[isSelected] -->
        <div class="con01" data-aos="fade-up">
          <div class="img swiper-container">
            <div class="swiper-wrapper" data-reservation-hero-slides></div>
          </div>
          <div class="tx1_1">이용안내</div>
        </div>
        <div class="conReservation w1440">
          <div class="conTitle" data-aos="fade-up">
            <div class="tx1">INFORMATION</div>
            <div class="tx2">
              <div class="bold spot">펜션정보</div>
            </div>
          </div>

          <!-- MAPPER: property.usageGuide, reservationGuide, checkInOutInfo; property.refundPolicies -->
          <div class="reservationWrap" data-aos="fade-up">
            <!-- MAPPER: customFields.pages.reservation.sections[0].about.title (우선), property.usageGuide (내용) -->
            <div class="accordion">
              <div class="accordionHeader" data-target="usage-content">
                <span class="accordionTitle" data-reservation-usage-title>이용안내</span>
                <span class="accordionIcon">+</span>
              </div>
              <div class="accordionContent active" id="usage-content" data-reservation-usage-content></div>
            </div>

            <!-- MAPPER: property.reservationGuide -->
            <div class="accordion">
              <div class="accordionHeader" data-target="reservation-guide-content">
                <span class="accordionTitle">예약안내</span>
                <span class="accordionIcon">+</span>
              </div>
              <div class="accordionContent active" id="reservation-guide-content" data-reservation-guide-content></div>
            </div>

            <!-- MAPPER: property.checkInOutInfo -->
            <div class="accordion">
              <div class="accordionHeader" data-target="checkin-content">
                <span class="accordionTitle">입/퇴실 안내</span>
                <span class="accordionIcon">+</span>
              </div>
              <div class="accordionContent active" id="checkin-content" data-reservation-checkin-content></div>
            </div>

            <!-- MAPPER: customFields.pages.reservation.about (title, images, description) -->
            <div class="accordion" data-reservation-about-accordion>
              <div class="accordionHeader" data-target="about-content">
                <span class="accordionTitle" data-reservation-about-title>예약 정보</span>
                <span class="accordionIcon">+</span>
              </div>
              <div class="accordionContent active" id="about-content">
                <div data-reservation-about-images></div>
                <div data-reservation-about-description></div>
              </div>
            </div>

          </div>

        <!-- MAPPER: property.refundPolicies[] (refundProcessingDays, refundRate) -->
        <div class="conRefund w1440">
          <div class="conTitle" data-aos="fade-up">
            <div class="tx1">REFUND INFO</div>
            <div class="tx2">
              <span class="bold spot">환불정보</span>
            </div>
          </div>
          <div class="bottom" data-aos="fade-up" data-reservation-refund-table></div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="js/preview-handler.js"></script>
    <script src="js/image-helpers.js"></script>
    <script src="js/data-mapper/core/base-mapper.js"></script>
    <script src="js/data-mapper/pages/reservation-mapper.js"></script>
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
    <script src="js/header-footer-loader.js"></script>
    <script src="js/common.js"></script>
    <script src="js/pages/reservation.js"></script>
  </body>
</html>
