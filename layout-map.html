<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="안녕하세요!!">
    <meta name="keywords" content="한옥,전통,맥스!!">
    <link rel="preload" href="styles/common.css" as="style">
    <link rel="preload" href="styles/layout-map.css" as="style">

    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/slider.css">
    <link rel="stylesheet" href="styles/layout-map.css">

  <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Max 한옥" />
  <meta property="og:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />
  <meta property="og:image" content="https://bookingplay-media-fred.s3.amazonaws.com/item_images/2021/12/06/kOscAnHqKp4e.jpg" />
  <meta property="og:url" content="https://max-hanok.com" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Max 한옥" />
  <meta name="twitter:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />
  <meta name="twitter:image" content="https://bookingplay-media-fred.s3.amazonaws.com/item_images/2021/12/06/kOscAnHqKp4e.jpg" />
</head>
<body>

    <main class="main-content">
        <!-- CUSTOM FIELD : 메인 소개 섹션 -->
        <section class="hero-section hero-center-bottom">
            <div class="hero-slider" data-hero-slider>
                <!-- 배치도 이미지 동적 매핑 -->
            </div>
            <!-- 페이지명 하드코딩 -->
            <div class="hero-property-title">LAYOUT MAP</div>
            <div class="hero-bottom-info">
                <div class="hero-progress-container">
                    <button class="hero-nav-prev" aria-label="Previous slide">&lt;</button>
                    <span class="current-slide hero-indicators" data-current-slide>01</span>
                    <div class="hero-progress-bar">
                        <div class="hero-progress-fill" data-hero-progress></div>
                    </div>
                    <span class="total-slides hero-indicators" data-total-slides>02</span>
                    <button class="hero-nav-next" aria-label="Next slide">&gt;</button>
                </div>
            </div>
        </section>

        <div class="main-about-section">
            <div class="main-about-content">
                <!-- homepage.customFields.pages.layoutMap.sections[0].about.title 매핑 -->
                <h2 class="main-about-title" data-layout-map-about-title></h2>
                <!-- homepage.customFields.pages.layoutMap.sections[0].about.description 매핑 -->
                <p class="main-about-description" data-layout-map-about-description></p>
            </div>

            <!-- CUSTOM FIELD : 배치도 이미지 섹션 / 동적 블록 생성 영역 -->
            <!-- homepage.customFields.pages.layoutMap.sections[0].about.images[] 매핑 -->
            <section class="intro-section">
                <!-- 동적으로 layout-map 이미지가 생성됩니다 -->
            </section>
        </div>

        <!-- property.images[0].exterior[] 첫번째 이미지 매핑 -->
        <section class="full-banner" data-main-banner>
            <!-- property.nameEn 매핑 -->
            <h2 class="full-banner-title" data-closing-property-name></h2>
        </section>

    </main>

    <!-- Include ImageWithFallback script (standard-template-data.json에서만 필요) -->
    <!-- <script src="js/image-with-fallback.js"></script> -->

    <!-- Image Helpers -->
    <script src="js/image-helpers.js"></script>

    <!-- Base Data Mapper (must load before preview-handler) -->
    <script src="js/data-mapper/core/base-mapper.js"></script>

    <!-- Layout Map Page Mapper -->
    <script src="js/data-mapper/pages/layout-map-mapper.js"></script>

    <!-- Preview Handler for Admin Integration -->
    <script src="js/preview-handler.js"></script>

    <!-- Header Footer Mapper -->
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>

    <!-- Header and Footer Loader -->
    <script src="js/header-footer-loader.js"></script>

    <!-- Fullscreen Slider Component -->
    <script src="js/components/fullscreen-slider.js"></script>

    <!-- Page-specific script -->
    <script src="js/pages/layout-map.js"></script>

    <!-- Scroll Animations -->
    <script src="js/scroll-animations.js"></script>

    <!-- Initialize Data Mapper -->
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // Preview 모드가 아닐 때만 초기화 (preview-handler가 완전히 담당)
            const isPreview = window.parent !== window;
            if (!isPreview) {
                const layoutMapMapper = new LayoutMapMapper();
                await layoutMapMapper.initialize();

                // Initialize hero slider after mapper finishes
                setTimeout(() => {
                    if (typeof window.initHeroSlider === 'function') {
                        window.initHeroSlider();
                    }
                }, 100);
            }
        });
    </script>

</body>
</html>
