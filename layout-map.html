<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="숙소 설명">
    <meta name="keywords" content="SEO 키워드">
    <title>배치도 - 숙소명</title>

    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/slider.css">
    <link rel="stylesheet" href="styles/layout-map.css">

  <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Max 한옥 펜션" />
  <meta property="og:description" content="BankAccount 역직렬화 수정 검증 테스트" />
  <meta property="og:image" content="https://nbuihqqrvgfuwjxgbdym.supabase.co/storage/v1/object/public/app-images/property/373324d8-f2fb-4cb1-a8b1-9fc3d7796624/thumbnail/1761277887779-7s034fpxa2.jpg" />
  <meta property="og:url" content="https://max-hanok.com" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Max 한옥 펜션" />
  <meta name="twitter:description" content="BankAccount 역직렬화 수정 검증 테스트" />
  <meta name="twitter:image" content="https://nbuihqqrvgfuwjxgbdym.supabase.co/storage/v1/object/public/app-images/property/373324d8-f2fb-4cb1-a8b1-9fc3d7796624/thumbnail/1761277887779-7s034fpxa2.jpg" />
</head>
<body>
    <main class="main-content">
        <!-- CUSTOM FIELD : 히어로 섹션 -->
        <!-- homepage.customFields.pages.layoutMap.sections[0].hero.images 매핑 -->
        <section class="hero-section hero-center-bottom">
            <div class="hero-slider" data-hero-slider>
                <!-- 동적으로 hero-slide가 생성됩니다 -->
            </div>
            <!-- 페이지명 하드코딩 -->
            <div class="hero-property-title">LAYOUT MAP</div>
            <div class="hero-bottom-info">
                <div class="hero-progress-container">
                    <button class="hero-nav-prev" aria-label="Previous slide">&lt;</button>
                    <span class="current-slide hero-indicators" data-current-slide>01</span>
                    <div class="hero-progress-bar">
                        <div class="hero-progress-fill" data-hero-progress></div>
                    </div>
                    <span class="total-slides hero-indicators" data-total-slides>01</span>
                    <button class="hero-nav-next" aria-label="Next slide">&gt;</button>
                </div>
            </div>
        </section>           
    
        <div class="layout-map-section">
            <div class="layout-map-intro">
                <h2 class="layout-map-title" data-layout-map-title></h2>
                <p class="layout-map-description" data-layout-map-description></p>
            </div>

            <!-- 이미지들 (수직으로 쌓임) -->
            <div class="layout-map-images-container" data-layout-map-images>
                <!-- 동적으로 생성됩니다 -->
            </div>
        </div>
    </main>

    <!-- property.images[0].exterior 첫번째 이미지 배경 매핑 -->
    <section class="full-banner animate-element" data-layout-banner>
        <!-- property.nameEn 매핑 (uppercase) -->
        <h2 class="full-banner-title" data-property-name-en></h2>
        <div class="full-banner-circle" data-layout-banner-bg></div>
    </section>

    <!-- property.nameEn 매핑 (uppercase, 5개 span 반복) -->
    <div class="marquee-section">
        <div class="marquee-container">
            <div class="marquee-text" data-marquee-property-name>
                <!-- 동적으로 span이 생성됩니다 -->
            </div>
        </div>
    </div>

    <!-- Common JavaScript -->
    <script src="js/common.js"></script>

    <!-- Common JavaScript -->
    <script src="js/common.js"></script>

    <!-- Image Helpers -->
    <script src="js/image-helpers.js"></script>

    <!-- Base Data Mapper -->
    <script src="js/data-mapper/core/base-mapper.js"></script>

    <!-- Layout Map Page Mapper -->
    <script src="js/data-mapper/pages/layout-map-mapper.js"></script>

    <!-- Preview Handler for Admin Integration -->
    <script src="js/preview-handler.js"></script>

    <!-- Header Footer Mapper -->
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>

    <!-- Header and Footer Loader -->
    <script src="js/header-footer-loader.js"></script>

    <!-- Fullscreen Slider Component -->
    <script src="js/components/fullscreen-slider.js"></script>

    <!-- Page-specific script -->
    <script src="js/pages/layout-map.js"></script>

    <!-- Scroll Animations -->
    <script src="js/scroll-animations.js"></script>

</body>
</html>
