<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:,">
    <title>Max 한옥</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/swiper/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/layout-map.css" />
    <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Max 한옥" />
  <meta property="og:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />
  <meta property="og:image" content="https://bookingplay-media-fred.s3.amazonaws.com/item_images/2021/12/06/kOscAnHqKp4e.jpg" />
  <meta property="og:url" content="https://max-hanok.com" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Max 한옥" />
  <meta name="twitter:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />
  <meta name="twitter:image" content="https://bookingplay-media-fred.s3.amazonaws.com/item_images/2021/12/06/kOscAnHqKp4e.jpg" />
</head>
  <body>
    <div class="wrapper">
<div class="container">
        <!-- MAPPER: homepage.customFields.pages.layoutMap.sections[0].hero.images[isSelected] -->
        <div class="con0" data-aos="fade-up">
          <div class="swiper-container">
            <div class="swiper-wrapper">
              <div class="swiper-slide">
                <div class="img"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Room Navigation -->
        <div id="snb_wrap">
          <ul data-room-nav-list>
            <li class="active"><a href="layout-map.html">미리보기</a></li>
          </ul>
        </div>

        <div class="con3 pt200">
          <div class="w1440">
            <!-- MAPPER: homepage.customFields.pages.layoutMap.sections[0].about.title -->
            <!-- MAPPER: homepage.customFields.pages.layoutMap.sections[0].about.images[].description (3개까지, fallback: #이미지설명) -->
            <div class="conTitle" data-aos="fade-up">
              <div class="subTitle"></div>
              <div class="title"></div>
            </div>
            <!-- MAPPER: rooms[].images[0].thumbnail[0].url + name + description (Room Preview Swiper) -->
            <div class="swiper-container" data-aos="fade-up">
              <div class="swiper-wrapper"></div>
              <div class="swiperNavi">
                <div class="swiper-button-prev">
                  <img src="images/icon_arrow_left_2.png" alt="" />
                </div>
                <div class="bar"></div>
                <div class="swiper-button-next">
                  <img src="images/icon_arrow_right_2.png" alt="" />
                </div>
              </div>
            </div>
          </div>
        </div>
        <!-- MAPPER: homepage.customFields.pages.layoutMap.sections[0].about.images[0].url -->
        <div class="con5 w1440">
          <div class="img" data-aos="fade-up">
            <img alt="" />
          </div>
          <div class="w1440">
            <div class="tx travelFont" data-aos="fade-up">Room Priview</div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@beta/bundled/locomotive-scroll.min.js"></script>
  <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
  <script src="js/data-mapper/pages/layout-map-mapper.js"></script>
  <script src="js/image-helpers.js"></script>
  <script src="js/preview-handler.js"></script>
  <script src="js/header-footer-loader.js"></script>
  <script src="js/common.js"></script>
  <script src="js/pages/layout-map.js"></script>
</html>
