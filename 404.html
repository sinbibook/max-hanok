<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="페이지를 찾을 수 없습니다">
    <meta name="keywords" content="404">
    <title>404 - 페이지를 찾을 수 없습니다</title>

    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">

    <style>
        .not-found-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--color-primary);
            padding: 40px 20px;
            text-align: center;
        }

        .not-found-content {
            max-width: 600px;
        }

        .not-found-code {
            font-size: 5rem;
            font-weight: 700;
            color: var(--color-secondary);
            margin-bottom: 20px;
            font-family: var(--font-en-main);
        }

        .not-found-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-secondary);
            margin-bottom: 20px;
            line-height: 1.4;
            letter-spacing: -0.02em;
        }

        .not-found-description {
            font-size: 1.125rem;
            font-weight: 400;
            color: #666;
            line-height: 1.8;
            margin-bottom: 40px;
            letter-spacing: 0.01em;
        }

        .not-found-button {
            display: inline-block;
            padding: 16px 40px;
            background-color: var(--color-secondary);
            color: white;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 0;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .not-found-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            transition: width 0.3s ease;
        }

        .not-found-button:hover::before {
            width: 100%;
        }

        .not-found-button:hover {
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .not-found-code {
                font-size: 3.5rem;
            }

            .not-found-title {
                font-size: 1.5rem;
            }

            .not-found-description {
                font-size: 1rem;
            }
        }
    </style>
  <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Max 한옥 펜션" />
  <meta property="og:description" content="BankAccount 역직렬화 수정 검증 테스트" />
  <meta property="og:image" content="https://nbuihqqrvgfuwjxgbdym.supabase.co/storage/v1/object/public/app-images/property/373324d8-f2fb-4cb1-a8b1-9fc3d7796624/thumbnail/1761277887779-7s034fpxa2.jpg" />
  <meta property="og:url" content="https://max-hanok.com" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Max 한옥 펜션" />
  <meta name="twitter:description" content="BankAccount 역직렬화 수정 검증 테스트" />
  <meta name="twitter:image" content="https://nbuihqqrvgfuwjxgbdym.supabase.co/storage/v1/object/public/app-images/property/373324d8-f2fb-4cb1-a8b1-9fc3d7796624/thumbnail/1761277887779-7s034fpxa2.jpg" />
</head>
<body>
    <div class="not-found-container">
        <div class="not-found-content">
            <div class="not-found-code">404</div>
            <h1 class="not-found-title">페이지를 찾을 수 없습니다</h1>
            <p class="not-found-description">죄송합니다. 요청하신 페이지가 존재하지 않거나 비활성화되어 있습니다.</p>
            <a href="index.html" class="not-found-button">홈으로 돌아가기</a>
        </div>
    </div>

    <!-- Preview Handler for Admin Integration -->
    <script src="js/preview-handler.js"></script>
</body>
</html>
