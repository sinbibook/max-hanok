  <head>

      rel="stylesheet"
      href="https://unpkg.com/swiper/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">

    <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Max 한옥 - 오시는길" />
  <meta property="og:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />
  <meta property="og:image" content="https://bookingplay-media-fred.s3.amazonaws.com/item_images/2021/12/06/kOscAnHqKp4e.jpg" />
  <meta property="og:url" content="https://max-hanok.com" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Max 한옥 - 오시는길" />
  <meta name="twitter:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />

  <body>
    <div class="wrapper">
<div class="container">
        <!-- MAPPER: customFields.directions.hero.images[0] -->
        <div class="con0 height" data-aos="fade-up">
          <div class="swiper-container">
            <div class="swiper-wrapper">
              <div class="swiper-slide">
                <div class="img"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="con12" data-aos="fade-up">
          <div class="tx0">
            <span class="travelFont">Direction</span>
            <span class="tx0_1">오시는길</span>
          </div>
        </div>
        <!-- MAPPER: property.latitude, property.longitude -->
        <div class="con14 w1440">
          <div class="map_wrap" data-aos="fade-up">
            <div class="map_inner">
              <div id="kakao-map"></div>
            </div>
          </div>

          <!-- MAPPER: property.address -->
          <div class="address" data-aos="fade-up">
            <div class="tx1">네비게이션 이용 시</div>
            <div class="tx2">
              도로명 주소 ｜
              <!-- MAPPER: property.businessInfo.businessAddress -->
              <span data-directions-address></span>
            </div>
          </div>

          <!-- MAPPER: customFields.pages.directions.sections[0].notice.title + description -->
          <div class="address notice" data-aos="fade-up" data-directions-notice-section>
            <div class="tx1" data-directions-notice-title>이용안내</div>
            <div class="tx2" data-directions-notice-description>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>

  <script type="text/javascript" src="js/kakao-maps-sdk.js"></script>
  <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
  <script src="js/data-mapper/pages/directions-mapper.js"></script>
  <script src="js/image-helpers.js"></script>
  <script src="js/preview-handler.js"></script>
  <script src="js/header-footer-loader.js"></script>
  <script src="js/common.js"></script>
</html>
