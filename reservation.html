    <script type="text/javascript">
        function setCookie(name, value, expirehours) {
            var todayDate = new Date();
            todayDate.setHours(todayDate.getHours() + expirehours);
            document.cookie = name + "=" + escape(value) + "; path=/; expires=" + todayDate.toGMTString() + ";";
        }

        function closeWin(id, checkbox) {
            if (checkbox.checked) {
                setCookie(id, "done", 1);
            }
            document.getElementById(id).style.display = "none";
        }
    </script>

<body>
    <script src="js/header-footer-loader.js"></script>
    <div id="sh_wrapper">
    <main id="sh_container">
    
            <!-- main_banner [s] -->
            <article>
                <div id="main_banner">
                    <div class="swiper-container main_slide">
                        <!-- MAPPER: customFields.pages.reservation.sections[0].hero.images[isSelected] → 슬라이드 동적 생성 -->
                        <div class="swiper-wrapper"></div>
                    </div>
                </div>
            </article>
            <!-- main_banner [e] -->

            <!-- reservation content [s] -->
            <div id="room_cont">
                <div id="reserve">
                    <div class="tit">
                        <span class="deco"></span>
                        <!-- MAPPER: reservation.hero.title (1순위) / 값 없으면 아래 기본값 유지 -->
                        <h1 data-reservation-title><span>RESERVATION</span> INFORMATION</h1>
                    </div>
                    <!-- MAPPER: property.realtimeBookingId → 예약 링크 (제목 아래 중앙 버튼) -->
                    <div class="golink">
                        <a href="#!">예약하기</a>
                    </div>
                    <div class="cont">
                        <div class="room_if inner" data-aos="fade-up" style="padding-top:0;">
                            <div class="info">
                                <div class="r_cont reserve">
                                    <div class="check">
                                        <div>
                                            <h3>예약안내</h3>
                                            <!-- MAPPER: property.reservationGuide (\n→<br>) -->
                                            <ul class="dot">
                                                <li data-reservation-guide></li>
                                            </ul>
                                        </div>
                                        <div>
                                            <h3>환불안내</h3>
                                            <!-- MAPPER: property.refundPolicies[] → 동적 생성 -->
                                            <ul class="dot">
                                                <li data-reservation-refund></li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- reservation content [e] -->

    </main>
    </div>
