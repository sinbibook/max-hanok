<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="안녕하세요!!">
    <meta name="keywords" content="한옥,전통,맥스!!">
    <title>Max 한옥</title>

    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <style>
        /* 404 페이지 헤더 스타일 */
        .transparent-header {
            background-color: var(--color-primary) !important;
        }

        .error-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fff;
            flex-direction: column;
            gap: 30px;
            text-align: center;
            padding: 100px 20px;
            min-height: 100vh;
            font-family: var(--font-ko-main, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
        }

        .error-icon {
            width: 80px;
            height: 80px;
            color: var(--color-secondary, #0f0f0f);
        }

        .error-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--color-secondary, #0f0f0f);
            margin: 0;
        }

        .error-message {
            font-size: 18px;
            color: #666;
            max-width: 500px;
            line-height: 1.6;
            margin: 0;
        }

        .error-button {
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background-color: var(--color-secondary, #0f0f0f);
            border: none;
            border-radius: 0;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .error-button:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .error-title {
                font-size: 24px;
            }

            .error-message {
                font-size: 16px;
            }

            .error-button {
                padding: 12px 30px;
                font-size: 14px;
            }
        }
    </style>
  <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Max 한옥" />
  <meta property="og:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />
  <meta property="og:image" content="https://bookingplay-media-fred.s3.amazonaws.com/item_images/2021/12/06/kOscAnHqKp4e.jpg" />
  <meta property="og:url" content="https://max-hanok.com" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Max 한옥" />
  <meta name="twitter:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />
  <meta name="twitter:image" content="https://bookingplay-media-fred.s3.amazonaws.com/item_images/2021/12/06/kOscAnHqKp4e.jpg" />
</head>
<body>

    <div class="error-container">
        <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <circle cx="12" cy="16" r="0.5" fill="currentColor"></circle>
        </svg>
        <h1 class="error-title">이 페이지는 이용할 수 없습니다</h1>
        <p class="error-message">죄송합니다. 요청하신 페이지는 현재 이용할 수 없습니다.</p>
        <button class="error-button" onclick="window.location.href='index.html'">홈으로 돌아가기</button>
    </div>

    <!-- Preview Handler for Admin Integration -->
    <script src="js/preview-handler.js"></script>

    <!-- Base Data Mapper -->
    <script src="js/data-mapper/core/base-mapper.js"></script>

</body>
</html>
