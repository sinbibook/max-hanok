<!DOCTYPE html>
<html lang="ko">
  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:,">

    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <!-- Preload critical resources -->
    <link rel="preload" href="styles/theme.css" as="style">
    <link rel="preload" href="styles/common.css" as="style">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/facility.css" />
    <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Max 한옥 - 시설안내" />
  <meta property="og:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />
  <meta property="og:image" content="https://bookingplay-media-fred.s3.amazonaws.com/item_images/2021/12/06/kOscAnHqKp4e.jpg" />
  <meta property="og:url" content="https://max-hanok.com" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Max 한옥 - 시설안내" />
  <meta name="twitter:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />

</head>
  <body>
    <div class="wrapper">
      <div class="container">
        <!-- MAPPER: property.facilities[current].images[isSelected][0].url + name -->
        <div class="con0" data-aos="fade-up">
          <div class="swiper">
            <div class="swiper-wrapper" data-facility-hero-slides></div>
            <div class="swiperNavi">
              <div class="swiper-button-prev">
                <img src="images/icon_left_1.png" alt="" />
                Prev
              </div>
              <div class="bar"></div>
              <div class="swiper-button-next">
                Next
                <img src="images/icon_right_1.png" alt="" />
              </div>
            </div>
          </div>
        </div>
        <div class="con11">
          <div class="w1440">
            <!-- MAPPER: property.facilities[current].name + usageGuide -->
            <div class="conTitle" data-aos="fade-up">
              <div class="tx1">SPECIAL</div>
              <!-- MAPPER: property.facilities[current].name -->
              <div class="tx2">
                <div class="bold spot" data-facility-name></div>
              </div>
              <!-- MAPPER: property.facilities[current].usageGuide -->
              <div class="tx3" data-facility-usage></div>
            </div>
          </div>
        </div>
        <!-- MAPPER: property.facilities[current].images[isSelected][0~2] + property.name -->
        <div class="con12">
          <div class="img img_1" data-aos="fade-up">
            <div class="inner">
              <div class="imgOb">
                <!-- MAPPER: property.facilities[current].images[isSelected][0].url -->
                <img src="images/con12_1.png" alt="" data-facility-image-0 />
              </div>
              <div class="num">02</div>
              <!-- MAPPER: property.name -->
              <div class="text">CONTENT · <span data-facility-content-text></span></div>
            </div>
          </div>
          <div class="img img_2" data-aos="fade-down">
            <div class="inner">
              <div class="imgOb">
                <!-- MAPPER: property.facilities[current].images[isSelected][1].url -->
                <img src="images/con12_2.png" alt="" data-facility-image-1 />
              </div>
              <div class="num">01</div>
              <!-- MAPPER: property.name -->
              <div class="text">CONTENT · <span data-facility-content-text></span></div>
            </div>
          </div>
          <div class="tx1">Comfortable trip</div>
          <div class="img img_3" data-aos="fade-up">
            <div class="inner">
              <div class="imgOb">
                <!-- MAPPER: property.facilities[current].images[isSelected][2].url -->
                <img src="images/con12_3.png" alt="" data-facility-image-2 />
              </div>
              <div class="num">03</div>
              <!-- MAPPER: property.name -->
              <div class="text">CONTENT · <span data-facility-content-text></span></div>
            </div>
          </div>
        </div>
        <!-- MAPPER: property.facilities[].images[isSelected][0] + name -->
        <div class="con3 mb230">
          <div class="conTitle" data-aos="fade-up">
            <div class="tx1">SPECIAL PREVIEW</div>
            <div class="tx2">
              <div class="bold spot">다양한 즐길거리</div>
            </div>
          </div>
          <div class="swiper-pagination" data-aos="fade-up"></div>
          <!-- MAPPER: facility preview cards 동적 생성 -->
          <div class="swiper">
            <div class="swiper-wrapper" data-facility-preview-slides></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="js/preview-handler.js"></script>
    <script src="js/image-helpers.js"></script>
    <script src="js/data-mapper/core/base-mapper.js"></script>
    <script src="js/data-mapper/pages/facility-mapper.js"></script>
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
    <script src="js/header-footer-loader.js"></script>
    <script src="js/common.js"></script>
    <script src="js/pages/facility.js"></script>
  </body>
</html>
