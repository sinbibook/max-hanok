<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:,">
    <title>Max 한옥 - 홈</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/swiper/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/popup.css">
    <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Max 한옥 - 홈" />
  <meta property="og:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />
  <meta property="og:image" content="https://bookingplay-media-fred.s3.amazonaws.com/item_images/2021/12/06/kOscAnHqKp4e.jpg" />
  <meta property="og:url" content="https://max-hanok.com" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Max 한옥 - 홈" />
  <meta name="twitter:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />
  <meta name="twitter:image" content="https://bookingplay-media-fred.s3.amazonaws.com/item_images/2021/12/06/kOscAnHqKp4e.jpg" />
</head>
  <body>
    <div class="wrapper">
<div class="container">
        <div class="con0" data-aos="fade-up">
          <div class="swiper-container">
            <!-- MAPPER: customFields.pages.index.sections[0].hero.images[isSelected] -->
            <div class="swiper-wrapper">
            </div>
            <div class="swiperNavi">
              <div class="swiper-button-prev">
                <img src="images/icon_arrow_left_1.png" alt="" />
                Prev
              </div>
              <div class="bar"></div>
              <div class="swiper-button-next">
                Next
                <img src="images/icon_arrow_right_1.png" alt="" />
              </div>
            </div>
          </div>
          <!-- MAPPER: property.name (숙소 한글명) -->
          <div class="tx1"></div>
        </div>
        <!-- MAPPER: property.nameEn + customFields.pages.index.sections[0].hero.images[isSelected].url -->
        <div class="con1">
          <div class="img">
            <img alt="" data-aos="fade-up" data-index-con1-image />
            <div class="tx travelFont __anim-sentence">
              <div class="__sentence">
                <span class="travelFont"></span>
              </div>
            </div>
          </div>
        </div>
        <!-- MAPPER: customFields.pages.index.sections[0].signature.images[isSelected] -->
        <div class="con2">
          <div class="conTitle" data-aos="fade-up">
            <div class="subTitle">
            </div>
            <div class="title"></div>
          </div>
          <!-- MAPPER: signature.images rolling animation -->
          <div class="imgRolling">
          </div>
        </div>
        <!-- MAPPER: customFields.pages.index.sections[0].gallery (title + tags) -->
        <!-- MAPPER: property.rooms[].images[0].thumbnail[isSelected] (슬라이드) -->
        <div class="con3">
          <div class="w1440">
            <div class="conTitle" data-aos="fade-up">
              <div class="subTitle">
              </div>
              <div class="title"></div>
            </div>
            <!-- MAPPER: rooms slider -->
            <div class="swiper-container" data-aos="fade-up">
              <div class="swiper-wrapper">
              </div>
              <div class="swiperNavi">
                <div class="swiper-button-prev">
                  <img src="images/icon_arrow_left_2.png" alt="" />
                </div>
                <div class="bar"></div>
                <div class="swiper-button-next">
                  <img src="images/icon_arrow_right_2.png" alt="" />
                </div>
              </div>
            </div>
          </div>
        </div>
        <!-- MAPPER: customFields.pages.index.sections[0].essence (title + tags) -->
        <!-- MAPPER: property.facilities[].images[isSelected] (슬라이드) -->
        <div class="con4">
          <div class="w1440">
            <div class="conTitle">
              <div class="subTitle">
              </div>
              <div class="title"></div>
              <div class="swiperNavi">
                <div class="swiper-button-prev">
                  <img src="images/icon_arrow_left_2.png" alt="" />
                </div>
                <div class="bar"></div>
                <div class="swiper-button-next">
                  <img src="images/icon_arrow_right_2.png" alt="" />
                </div>
              </div>
            </div>
            <!-- MAPPER: facilities slider -->
            <div class="swiper-container">
              <div class="swiper-wrapper">
              </div>
            </div>
          </div>
        </div>
        <!-- MAPPER: customFields.pages.index.sections[0].closing.images[isSelected] + closing.title -->
        <div class="con5">
          <div class="img" data-aos="fade-up"></div>
          <div class="w1440">
            <div class="tx travelFont" data-aos="fade-up">
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="popup-container"></div>
  </body>
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@beta/bundled/locomotive-scroll.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
  <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
  <script src="js/data-mapper/pages/index-mapper.js"></script>
  <script src="js/image-helpers.js"></script>
  <script src="js/preview-handler.js"></script>
  <script src="js/header-footer-loader.js"></script>
  <script src="js/common.js"></script>
  <script src="js/popup.js"></script>
</html>
