    <link rel="stylesheet" href="styles/common.css">

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Max 한옥 - 숙소소개" />
  <meta property="og:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />
  <meta property="og:image" content="https://bookingplay-media-fred.s3.amazonaws.com/item_images/2021/12/06/kOscAnHqKp4e.jpg" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Max 한옥 - 숙소소개" />
  <meta name="twitter:description" content="자연이 함께하는 곳, 비자숲길15 제주펜션 입니다! 비자림 인근에 위치해 있어 숲내음을 맡으며 편안히 휴식을 즐기세요!" />

  <body>
    <div class="wrapper">
<div class="container">
        <!-- MAPPER: customFields.pages.main.hero.images[isSelected] -->
        <div class="con0" data-aos="fade-up">
          <div class="swiper-container">
            <div class="swiper-wrapper">
            </div>
            <div class="swiperNavi">
              <div class="swiper-button-prev">
                <img src="images/icon_arrow_left_1.png" alt="" />
                Prev
              </div>
              <div class="bar"></div>
              <div class="swiper-button-next">
                Next
                <img src="images/icon_arrow_right_1.png" alt="" />
              </div>
            </div>
          </div>
        </div>
        <!-- MAPPER: property.nameEn + property.images[0].exterior[isSelected].url -->
        <div class="con1">
          <div class="img">
            <img alt="" data-aos="fade-up" />
            <div class="tx travelFont"></div>
          </div>
        </div>
        <!-- MAPPER: customFields.pages.main.about (title + images rolling) -->
        <div class="con2">
          <div class="conTitle" data-aos="fade-up">
            <div class="subTitle">
            </div>
            <div class="title"></div>
          </div>
          <!-- MAPPER: about[].images rolling -->
          <div class="imgRolling">
          </div>
        </div>
        <!-- MAPPER: property.surrounding[0].images[isSelected] -->
        <div class="con5">
          <div class="img" data-aos="fade-up"></div>
          <div class="w1440">
            <div class="tx travelFont" data-aos="fade-up">
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
  <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
  <script src="js/data-mapper/pages/main-mapper.js"></script>
  <script src="js/image-helpers.js"></script>
  <script src="js/preview-handler.js"></script>
  <script src="js/header-footer-loader.js"></script>
  <script src="js/common.js"></script>
</html>
